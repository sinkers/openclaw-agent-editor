version: '3.9'

# Integration test compose: starts an openclaw gateway container + the editor backend.
# Usage:
#   docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from test-runner
#
# The openclaw container runs: openclaw gateway run --auth none --port 18789
# The editor backend is configured to point at it.

services:
  openclaw:
    image: node:22-slim
    command: >
      sh -c "npm install -g openclaw@latest &&
             mkdir -p /root/.openclaw &&
             echo '{\"agents\":{\"list\":[{\"id\":\"test-agent\",\"name\":\"Test Agent\",\"workspace\":\"/root/.openclaw/workspaces/test-agent\"}]}}' > /root/.openclaw/openclaw.json &&
             openclaw gateway run --auth none --port 18789"
    ports:
      - "18789:18789"
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -sf http://localhost:18789/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  editor-backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - CORS_ORIGINS=http://localhost:5173
      - GATEWAY_URL=http://openclaw:18789
    volumes:
      # In test mode, mount a fresh openclaw config directory
      - openclaw-test-data:/root/.openclaw
    depends_on:
      openclaw:
        condition: service_healthy

  test-runner:
    image: node:22-slim
    working_dir: /app
    command: >
      sh -c "npm ci && npm run test:integration"
    environment:
      - EDITOR_BACKEND_URL=http://editor-backend:3001
      - OPENCLAW_GATEWAY_URL=http://openclaw:18789
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - editor-backend

volumes:
  openclaw-test-data:
